services:
  postgres:
    image: postgres:16-alpine
    container_name: legaltech-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: legaltech
      POSTGRES_PASSWORD: legaltech
      POSTGRES_DB: legaltech
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U legaltech"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: legaltech-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MinIO (S3 compatível) — para storage de documentos (LGPD: dados sob seu controle)
  minio:
    image: minio/minio:latest
    container_name: legaltech-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: legaltech
      MINIO_ROOT_PASSWORD: legaltech123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  redisdata:
  miniodata:

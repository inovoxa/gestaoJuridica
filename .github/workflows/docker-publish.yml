name: Build & Publish (Docker)

# Builda e publica a imagem no GitHub Container Registry (GHCR) a cada push na main.
# Imagem resultante: ghcr.io/inovoxa/gestaojuridica:latest

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/inovoxa/gestaojuridica

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: pnpm install --no-frozen-lockfile

      - name: Gerar cliente Prisma
        run: pnpm --filter @legaltech/db generate

      - name: Testes (util brasileiro — CNJ, feriados, prazos)
        run: pnpm --filter @legaltech/core test

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadados (tags/labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
